# .github/workflows/ci.yml
name: CI/CD

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci
    #   - run: npm run lint
    #   - run: npm test -- --watchAll=false --coverage
      - run: npm run build
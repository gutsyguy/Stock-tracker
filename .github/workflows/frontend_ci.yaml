name: CI Frontend

on:
  push:
      paths:
            - frontend/**
  pull_request:
        paths:
            - frontend/**

defaults:
    run:
        working-directory: ./frontend

jobs:
    lint-and-test:
        runs-on: ubuntu-latest

        steps:
        - uses: actions/checkout@v4
        - name: Install npm
          uses: npm/action-setup@v4
          with:
            version: 10  

        - name: Use Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 22
            cache-dependency-path: frontend/package-lock.json
            cache: 'npm'

        - name: Install dependencies
          run: npm install
        
        - name: Build
          run: npm run build